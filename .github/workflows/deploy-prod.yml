name: Deploy to prod

on:
  push:
    branches:
      - main

concurrency: deploy-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: prod

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/deploy
        with:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
          OPERA_RTC_QUEUE_URL: ${{ secrets.OPERA_RTC_QUEUE_URL }}
          GUNW_QUEUE_URL : ${{ secrets.GUNW_QUEUE_URL }}
          HYP3_ACCOUNT_IDS: ${{ secrets.HYP3_ACCOUNT_IDS }}
          CMR_DOMAIN: cmr.earthdata.nasa.gov
          HYP3_CONTENT_BUCKET: hyp3-opera-prod-contentbucket-2ypbtzzskwyr
          TEMPLATE_BUCKET: cf-templates-118mtzosmrltk-us-west-2
          APP_STACK_NAME: ingest-adapter-prod
          VPC_ID: ${{ secrets.VPC_ID }}
          SUBNET_IDS: ${{ secrets.SUBNET_IDS }}
